<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数学与物理体系交互可视化</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #eef4f4;
      --text: #17202a;
      --muted: #64748b;
      --line: #d5dde6;
      --ink: #253244;
      --math: #2563eb;
      --bridge: #7c3aed;
      --physics: #d97706;
      --core: #0f766e;
      --method: #be123c;
      --app: #15803d;
      --shadow: 0 16px 40px rgba(34, 44, 58, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 260px;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font-weight: 800;
      font-size: 17px;
      box-shadow: 0 6px 18px rgba(37, 50, 68, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 760;
    }

    .mode-line {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .tabs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fafb;
    }

    .tab {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #475569;
      padding: 9px 14px;
      cursor: pointer;
      min-width: 96px;
      transition: background 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }

    .tab[aria-selected="true"] {
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 4px 12px rgba(37, 50, 68, 0.12);
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      padding: 18px 24px 24px;
      min-height: 0;
    }

    .map-panel,
    .detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .map-panel {
      display: grid;
      grid-template-rows: auto minmax(560px, 1fr);
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(320px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #f8fafc;
      color: var(--muted);
    }

    .search input {
      border: 0;
      outline: 0;
      width: 100%;
      min-width: 120px;
      background: transparent;
      color: var(--text);
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: #475569;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 140ms ease, color 140ms ease, background 140ms ease;
    }

    .chip.active {
      border-color: #94a3b8;
      background: #edf6f5;
      color: #0f766e;
      font-weight: 700;
    }

    .switch,
    .range-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-size: 14px;
      min-height: 40px;
    }

    .switch input {
      width: 18px;
      height: 18px;
      accent-color: var(--core);
    }

    .range-control input {
      width: 110px;
      accent-color: var(--core);
    }

    .icon-buttons {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .icon-button:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .graph-wrap {
      min-height: 560px;
      background: #fbfcfd;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
    }

    .zone rect {
      fill: #f5f8fb;
      stroke: #dbe3ec;
      stroke-width: 1;
    }

    .zone {
      pointer-events: none;
    }

    .zone text {
      fill: #64748b;
      font-size: 16px;
      font-weight: 760;
    }

    .edge {
      fill: none;
      stroke: #aeb9c7;
      stroke-width: 1.6;
      opacity: 0.34;
      cursor: pointer;
      transition: opacity 120ms ease, stroke-width 120ms ease;
    }

    .edge.feedback {
      stroke-dasharray: 7 7;
    }

    .edge.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .edge.dimmed {
      opacity: 0.08;
    }

    .edge.active {
      opacity: 0.92;
      stroke-width: 3.2;
    }

    .edge-label rect {
      fill: #ffffff;
      stroke: #d5dde6;
      rx: 6;
      ry: 6;
    }

    .edge-label text {
      fill: #253244;
      font-size: 13px;
      font-weight: 650;
    }

    .edge-label {
      pointer-events: none;
    }

    .node {
      cursor: grab;
    }

    .node:active {
      cursor: grabbing;
    }

    .node rect.card {
      fill: #ffffff;
      stroke: #cbd5e1;
      stroke-width: 1.4;
      filter: drop-shadow(0 8px 18px rgba(37, 50, 68, 0.08));
      transition: opacity 120ms ease, stroke-width 120ms ease;
    }

    .node rect.stripe {
      stroke: none;
    }

    .node text {
      fill: #17202a;
      font-size: 14px;
      font-weight: 720;
      pointer-events: none;
    }

    .node .mini {
      fill: #64748b;
      font-size: 11px;
      font-weight: 650;
    }

    .node.dimmed {
      opacity: 0.22;
    }

    .node.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .node.active rect.card,
    .node.hovered rect.card {
      stroke-width: 2.4;
    }

    .node.match rect.card {
      stroke-width: 2.2;
      stroke: #0f766e;
    }

    .detail-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .detail-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .detail-kicker {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detail-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .detail-body {
      overflow: auto;
      padding: 16px 18px 20px;
    }

    .detail-body p {
      margin: 0 0 14px;
      color: #334155;
      line-height: 1.72;
      font-size: 15px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f8fafc;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      color: var(--ink);
    }

    .metric span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .relation-list {
      display: grid;
      gap: 10px;
      margin: 12px 0 0;
    }

    .relation {
      border: 1px solid var(--line);
      border-left-width: 5px;
      border-radius: 8px;
      padding: 11px 12px;
      background: #ffffff;
    }

    .relation strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.35;
    }

    .relation span {
      color: #475569;
      font-size: 13px;
      line-height: 1.55;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #ffffff;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
        min-width: 0;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .map-panel {
        grid-template-rows: auto 66vh;
      }

      .detail-panel {
        min-height: 340px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">ΣΦ</div>
        <div>
          <h1>数学与物理体系关系图</h1>
          <p class="mode-line" id="modeLine"></p>
        </div>
      </div>
      <div class="tabs" role="tablist" aria-label="视图切换">
        <button class="tab" type="button" data-mode="combined" aria-selected="true">综合关联</button>
        <button class="tab" type="button" data-mode="physics" aria-selected="false">物理体系</button>
        <button class="tab" type="button" data-mode="math" aria-selected="false">数学体系</button>
      </div>
    </header>

    <main class="workspace">
      <section class="map-panel" aria-label="关系图">
        <div class="toolbar">
          <label class="search">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="输入分支或主题" autocomplete="off">
          </label>
          <div class="filters" id="layerFilters" aria-label="层级筛选"></div>
          <label class="switch">
            <input id="focusToggle" type="checkbox" checked>
            <span>聚焦选择</span>
          </label>
          <label class="range-control">
            <span>连线密度</span>
            <input id="densityInput" type="range" min="1" max="3" value="1">
          </label>
          <div class="icon-buttons">
            <button class="icon-button" id="zoomOutButton" type="button" title="缩小" aria-label="缩小">−</button>
            <button class="icon-button" id="zoomInButton" type="button" title="放大" aria-label="放大">+</button>
            <button class="icon-button" id="resetButton" type="button" title="重置视图" aria-label="重置视图">↺</button>
          </div>
        </div>
        <div class="graph-wrap">
          <svg id="graph" viewBox="0 0 1400 860" role="img" aria-label="数学与物理体系网状图"></svg>
        </div>
      </section>

      <aside class="detail-panel" aria-label="说明">
        <div class="detail-head">
          <div class="detail-kicker" id="detailKicker"></div>
          <h2 class="detail-title" id="detailTitle"></h2>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </aside>
    </main>
  </div>

  <script>

    const MODE_META = {

          edge("ma_dynamical", "maq_collatz", "离散动力系统", 1)
        ]
      }
    };

    const COLOR_BY_COLUMN = {
      "数学工具": "#2563eb",
      "桥梁主题": "#7c3aed",
      "物理分支": "#d97706",
      "基础理论": "#0f766e",
      "研究对象": "#d97706",
      "方法与应用": "#be123c",
      "基础语言": "#2563eb",
      "核心结构": "#0f766e",
      "方法工具": "#be123c",
      "应用连接": "#15803d",
      "未解问题": "#dc2626"
    };

    const state = {
      mode: "combined",
      selectedNode: null,
      selectedEdge: null,
      hoveredNode: null,
      hoveredEdge: null,
      query: "",
      layers: new Set(),
      density: 1,
      focus: true,
      zoom: 1,
      pan: { x: 0, y: 0 },
      customPositions: {},
      suppressClick: false
    };

    const svg = document.getElementById("graph");
    const searchInput = document.getElementById("searchInput");
    const layerFilters = document.getElementById("layerFilters");
    const densityInput = document.getElementById("densityInput");
    const focusToggle = document.getElementById("focusToggle");
    const modeLine = document.getElementById("modeLine");
    const detailKicker = document.getElementById("detailKicker");
    const detailTitle = document.getElementById("detailTitle");
    const detailBody = document.getElementById("detailBody");

    function node(id, label, column, tag, description) {
      return { id, label, column, tag, description };
    }

    function edge(source, target, label, level, type = "support") {
      return { id: `${source}__${target}__${label}`, source, target, label, level, type };
    }

    function getModeData() {
      return DATA[state.mode];
    }

    function getNodeMap() {
      return new Map(getModeData().nodes.map((item) => [item.id, item]));
    }

    function resetView() {
      state.zoom = 1;
      state.pan = { x: 0, y: 0 };
      state.customPositions[state.mode] = {};
      clearInteractionState();
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      state.selectedNode = null;
      state.selectedEdge = null;
      state.hoveredNode = null;
      state.hoveredEdge = null;
      state.zoom = 1;
      state.pan = { x: 0, y: 0 };
      const columns = MODE_META[mode].columns.map((column) => column.key);
      state.layers = new Set(columns);
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.mode === mode));
      });
      renderLayerFilters();
      render();
    }

    function renderLayerFilters() {
      layerFilters.replaceChildren();
      MODE_META[state.mode].columns.forEach((column) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `chip ${state.layers.has(column.key) ? "active" : ""}`;
        button.textContent = column.key;
        button.style.borderColor = state.layers.has(column.key) ? column.color : "";
        button.addEventListener("click", () => {
          if (state.layers.has(column.key)) {
            state.layers.delete(column.key);
          } else {
            state.layers.add(column.key);
          }
          if (state.layers.size === 0) {
            MODE_META[state.mode].columns.forEach((item) => state.layers.add(item.key));
          }
          state.selectedNode = null;
          state.selectedEdge = null;
          renderLayerFilters();
          render();
        });
        layerFilters.append(button);
      });
    }

    function computePositions() {
      const mode = MODE_META[state.mode];
      const groups = new Map();
      getModeData().nodes.forEach((item) => {
        if (!groups.has(item.column)) groups.set(item.column, []);
        groups.get(item.column).push(item);
      });

      const positions = {};
      mode.columns.forEach((column) => {
        const items = groups.get(column.key) || [];
        const top = 160;
        const bottom = items.length > 10 ? 790 : 762;
        const gap = items.length <= 1 ? 0 : (bottom - top) / (items.length - 1);
        items.forEach((item, index) => {
          positions[item.id] = {
            x: column.x,
            y: items.length === 1 ? (top + bottom) / 2 : top + gap * index
          };
        });
      });

      const custom = state.customPositions[state.mode] || {};
      Object.keys(custom).forEach((id) => {
        positions[id] = { ...positions[id], ...custom[id] };
      });
      return positions;
    }

    function isNodeVisible(item) {
      return state.layers.has(item.column);
    }

    function searchMatches(item) {
      if (!state.query) return true;
      return `${item.label} ${item.column} ${item.tag} ${item.description}`.toLowerCase().includes(state.query);
    }

    function getAdjacency(visibleEdges = getModeData().edges) {
      const selected = state.selectedNode || (!hasSelection() ? state.hoveredNode : null);
      const activeEdge = state.selectedEdge || (!hasSelection() ? state.hoveredEdge : null);
      const adjacentNodes = new Set();
      const adjacentEdges = new Set();
      if (selected) {
        adjacentNodes.add(selected);
        visibleEdges.forEach((item) => {
          if (item.source === selected || item.target === selected) {
            adjacentEdges.add(item.id);
            adjacentNodes.add(item.source);
            adjacentNodes.add(item.target);
          }
        });
      }
      if (activeEdge) {
        const item = visibleEdges.find((candidate) => candidate.id === activeEdge);
        if (item) {
          adjacentEdges.add(item.id);
          adjacentNodes.add(item.source);
          adjacentNodes.add(item.target);
        }
      }
      return { selected, activeEdge, adjacentNodes, adjacentEdges };
    }

    function render() {
      const data = getModeData();
      const nodeMap = getNodeMap();
      const positions = computePositions();
      const shownNodes = data.nodes.filter(isNodeVisible);
      const shownNodeIds = new Set(shownNodes.map((item) => item.id));
      const shownEdges = data.edges.filter((item) => {
        return shownNodeIds.has(item.source) &&
          shownNodeIds.has(item.target) &&
          item.level <= Number(state.density);
      });
      const shownEdgeIds = new Set(shownEdges.map((item) => item.id));
      normalizeSelection(shownNodeIds, shownEdgeIds);
      const adjacency = getAdjacency(shownEdges);

      modeLine.textContent = MODE_META[state.mode].line;
      svg.replaceChildren();

      const defs = createSvg("defs");
      defs.innerHTML = `
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa8b7"></path>
        </marker>
      `;
      svg.append(defs);

      const viewport = createSvg("g", { transform: `translate(${state.pan.x} ${state.pan.y}) scale(${state.zoom})` });
      svg.append(viewport);

      renderZones(viewport);

      const edgeLayer = createSvg("g", { class: "edges" });
      const labelLayer = createSvg("g", { class: "edge-labels" });
      const nodeLayer = createSvg("g", { class: "nodes" });
      viewport.append(edgeLayer, labelLayer, nodeLayer);

      shownEdges.forEach((item) => {
        const source = positions[item.source];
        const target = positions[item.target];
        if (!source || !target) return;

        const path = createSvg("path", {
          class: edgeClass(item, adjacency),
          d: curvePath(source, target),
          stroke: edgeColor(item, nodeMap),
          "marker-end": item.type === "feedback" ? "url(#arrow)" : "",
          "data-edge-id": item.id
        });
        path.addEventListener("click", (event) => {
          event.stopPropagation();
          if (state.suppressClick) return;
          state.selectedEdge = item.id;
          state.selectedNode = null;
          clearHoverState();
          render();
        });
        edgeLayer.append(path);

        if (item.id === adjacency.activeEdge || adjacency.adjacentEdges.has(item.id) && (state.hoveredNode || state.selectedNode)) {
          renderEdgeLabel(labelLayer, source, target, item.label);
        }
      });

      shownNodes.forEach((item) => {
        const point = positions[item.id];
        if (!point) return;
        const group = createSvg("g", {
          class: nodeClass(item, adjacency),
          transform: `translate(${point.x} ${point.y})`,
          "data-node-id": item.id
        });
        group.addEventListener("pointerdown", (event) => startNodeDrag(event, item.id));
        group.addEventListener("click", (event) => {
          event.stopPropagation();
          if (state.suppressClick) {
            state.suppressClick = false;
            return;
          }
          state.selectedNode = item.id;
          state.selectedEdge = null;
          clearHoverState();
          render();
        });

        const color = COLOR_BY_COLUMN[item.column] || "#64748b";
        const rect = createSvg("rect", {
          class: "card",
          x: -NODE.width / 2,
          y: -NODE.height / 2,
          width: NODE.width,
          height: NODE.height,
          rx: 8,
          ry: 8,
          stroke: color
        });
        const stripe = createSvg("rect", {
          class: "stripe",
          x: -NODE.width / 2,
          y: -NODE.height / 2,
          width: 7,
          height: NODE.height,
          rx: 5,
          ry: 5,
          fill: color
        });
        const title = createWrappedText(item.label, 0, -5, 15, 9, "title-text");
        const mini = createSvg("text", { class: "mini", x: 0, y: 21, "text-anchor": "middle" });
        mini.textContent = item.tag;
        group.append(rect, stripe, title, mini);
        nodeLayer.append(group);
      });

      renderDetails(shownNodes, shownEdges, nodeMap, adjacency);
    }

    function normalizeSelection(shownNodeIds, shownEdgeIds) {
      if (state.selectedNode && !shownNodeIds.has(state.selectedNode)) state.selectedNode = null;
      if (state.hoveredNode && !shownNodeIds.has(state.hoveredNode)) state.hoveredNode = null;
      if (state.selectedEdge && !shownEdgeIds.has(state.selectedEdge)) state.selectedEdge = null;
      if (state.hoveredEdge && !shownEdgeIds.has(state.hoveredEdge)) state.hoveredEdge = null;
    }

    function hasSelection() {
      return Boolean(state.selectedNode || state.selectedEdge);
    }

    function clearHoverState() {
      state.hoveredNode = null;
      state.hoveredEdge = null;
    }

    function clearInteractionState() {
      state.selectedNode = null;
      state.selectedEdge = null;
      clearHoverState();
    }

    function renderZones(viewport) {
      const zoneLayer = createSvg("g", { class: "zones" });
      MODE_META[state.mode].columns.forEach((column) => {
        const width = state.mode === "math" ? 252 : 282;
        const zone = createSvg("g", { class: "zone" });
        const rect = createSvg("rect", {
          x: column.x - width / 2,
          y: 92,
          width,
          height: 730,
          rx: 8,
          ry: 8,
          fill: column.color,
          opacity: 0.9
        });
        const labelBg = createSvg("rect", {
          x: column.x - 72,
          y: 48,
          width: 144,
          height: 34,
          rx: 8,
          ry: 8,
          fill: "#ffffff",
          stroke: "#dbe3ec"
        });
        const text = createSvg("text", {
          x: column.x,
          y: 71,
          "text-anchor": "middle"
        });
        text.textContent = column.key;
        zone.append(rect, labelBg, text);
        zoneLayer.append(zone);
      });
      viewport.append(zoneLayer);
    }

    function edgeClass(item, adjacency) {
      const classes = ["edge", item.type];
      const focused = state.focus && (adjacency.selected || adjacency.activeEdge);
      const active = item.id === adjacency.activeEdge || adjacency.adjacentEdges.has(item.id);
      if (active) classes.push("active");
      if (focused && !active) classes.push("dimmed");
      return classes.join(" ");
    }

    function nodeClass(item, adjacency) {
      const classes = ["node"];
      const focused = state.focus && (adjacency.selected || adjacency.activeEdge);
      const active = item.id === state.selectedNode || item.id === state.hoveredNode || adjacency.adjacentNodes.has(item.id);
      const queryActive = Boolean(state.query);
      if (queryActive && !searchMatches(item) && !active) classes.push("dimmed");
      if (searchMatches(item) && queryActive) classes.push("match");
      if (item.id === state.selectedNode) classes.push("active");
      if (item.id === state.hoveredNode) classes.push("hovered");
      if (focused && !active) classes.push("dimmed");
      return classes.filter(Boolean).join(" ");
    }

    function edgeColor(item, nodeMap) {
      if (item.type === "feedback") return "#64748b";
      const source = nodeMap.get(item.source);
      const target = nodeMap.get(item.target);
      if (source && source.column === "桥梁主题") return COLOR_BY_COLUMN[target.column] || "#9aa8b7";
      if (target && target.column === "桥梁主题") return COLOR_BY_COLUMN[source.column] || "#9aa8b7";
      return COLOR_BY_COLUMN[target?.column] || COLOR_BY_COLUMN[source?.column] || "#9aa8b7";
    }

    function curvePath(source, target) {
      const dx = target.x - source.x;
      const dy = target.y - source.y;
      const bend = Math.max(70, Math.min(190, Math.abs(dx) * 0.38));
      if (Math.abs(dx) < 80) {
        const side = dy > 0 ? 1 : -1;
        return `M ${source.x} ${source.y} C ${source.x + 90} ${source.y + side * 45}, ${target.x + 90} ${target.y - side * 45}, ${target.x} ${target.y}`;
      }
      return `M ${source.x} ${source.y} C ${source.x + Math.sign(dx) * bend} ${source.y}, ${target.x - Math.sign(dx) * bend} ${target.y}, ${target.x} ${target.y}`;
    }

    function renderEdgeLabel(layer, source, target, label) {
      const x = (source.x + target.x) / 2;
      const y = (source.y + target.y) / 2;
      const width = Math.min(166, Math.max(64, label.length * 14));
      const group = createSvg("g", { class: "edge-label", transform: `translate(${x} ${y})` });
      group.append(createSvg("rect", { x: -width / 2, y: -15, width, height: 30 }));
      const text = createSvg("text", { x: 0, y: 5, "text-anchor": "middle" });
      text.textContent = label;
      group.append(text);
      layer.append(group);
    }

    function createWrappedText(text, x, y, lineHeight, maxChars, className) {
      const group = createSvg("text", { class: className, x, y, "text-anchor": "middle" });
      const lines = wrapText(text, maxChars).slice(0, 2);
      const startY = y - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => {
        const tspan = createSvg("tspan", { x, y: startY + index * lineHeight });
        tspan.textContent = line;
        group.append(tspan);
      });
      return group;
    }

    function wrapText(text, maxChars) {
      if (text.length <= maxChars) return [text];
      const punctuation = ["、", "与", "和", "及", "，"];
      const lines = [];
      let rest = text;
      while (rest.length > maxChars && lines.length < 2) {
        let cut = maxChars;
        for (let index = maxChars; index >= Math.max(4, maxChars - 4); index -= 1) {
          if (punctuation.includes(rest[index])) {
            cut = index + 1;
            break;
          }
        }
        lines.push(rest.slice(0, cut));
        rest = rest.slice(cut);
      }
      if (rest) lines.push(rest);
      if (lines.length > 2) {
        lines[1] = `${lines[1].slice(0, maxChars - 1)}…`;
      }
      return lines;
    }

    function renderDetails(nodes, edges, nodeMap, adjacency) {
      const selectedEdge = adjacency.activeEdge ? getModeData().edges.find((item) => item.id === adjacency.activeEdge) : null;
      const selectedNode = adjacency.selected ? nodeMap.get(adjacency.selected) : null;
      if (selectedEdge) {
        const source = nodeMap.get(selectedEdge.source);
        const target = nodeMap.get(selectedEdge.target);
        detailKicker.textContent = edgeKicker(selectedEdge);
        detailTitle.textContent = edgeTitle(selectedEdge, source, target);
        detailBody.innerHTML = "";
        detailBody.append(paragraph(selectedEdge.label));
        detailBody.append(relationCard(source.column, source.label, source.description, COLOR_BY_COLUMN[source.column]));
        detailBody.append(relationCard(target.column, target.label, target.description, COLOR_BY_COLUMN[target.column]));
        return;
      }
      if (selectedNode) {
        const relations = getModeData().edges
          .filter((item) => item.source === selectedNode.id || item.target === selectedNode.id)
          .filter((item) => item.level <= Number(state.density))
          .filter((item) => nodeMap.has(item.source) && nodeMap.has(item.target))
          .filter((item) => isNodeVisible(nodeMap.get(item.source)) && isNodeVisible(nodeMap.get(item.target)));
        detailKicker.textContent = `${selectedNode.column} · ${selectedNode.tag}`;
        detailTitle.textContent = selectedNode.label;
        detailBody.innerHTML = "";
        detailBody.append(paragraph(selectedNode.description));
        const list = document.createElement("div");
        list.className = "relation-list";
        relations.forEach((item) => {
          const otherId = item.source === selectedNode.id ? item.target : item.source;
          const other = nodeMap.get(otherId);
          const direction = relationRole(item, selectedNode.id);
          list.append(relationCard(direction, other.label, item.label, COLOR_BY_COLUMN[other.column]));
        });
        detailBody.append(list);
        return;
      }

      detailKicker.textContent = MODE_META[state.mode].title;
      detailTitle.textContent = "体系总览";
      detailBody.innerHTML = "";
      const metrics = document.createElement("div");
      metrics.className = "metric-grid";
      metrics.append(metric(nodes.length, "当前节点"));
      metrics.append(metric(edges.length, "当前连线"));
      detailBody.append(metrics);
      detailBody.append(paragraph(MODE_META[state.mode].overview));
      detailBody.append(createLegend());
    }

    function isDirectedEdge(item) {
      return state.mode === "combined" || item.type === "feedback";
    }

    function edgeKicker(item) {
      if (item.type === "feedback") return "物理推动数学";
      return isDirectedEdge(item) ? "方向性关联" : "双向关联";
    }

    function edgeTitle(item, source, target) {
      const connector = isDirectedEdge(item) ? "→" : "↔";
      return `${source.label} ${connector} ${target.label}`;
    }

    function relationRole(item, selectedId) {
      if (!isDirectedEdge(item)) return "关联";
      if (item.type === "feedback") {
        return item.source === selectedId ? "推动" : "受推动于";
      }
      return item.source === selectedId ? "通向" : "来源";
    }

    function metric(value, label) {
      const item = document.createElement("div");
      item.className = "metric";
      const strong = document.createElement("strong");
      strong.textContent = value;
      const span = document.createElement("span");
      span.textContent = label;
      item.append(strong, span);
      return item;
    }

    function paragraph(text) {
      const p = document.createElement("p");
      p.textContent = text;
      return p;
    }

    function relationCard(kicker, title, body, color) {
      const item = document.createElement("div");
      item.className = "relation";
      item.style.borderLeftColor = color || "#94a3b8";
      const strong = document.createElement("strong");
      strong.textContent = `${kicker}：${title}`;
      const span = document.createElement("span");
      span.textContent = body;
      item.append(strong, span);
      return item;
    }

    function createLegend() {
      const legend = document.createElement("div");
      legend.className = "legend";
      MODE_META[state.mode].columns.forEach((column) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = column.color;
        const label = document.createElement("span");
        label.textContent = column.key;
        item.append(swatch, label);
        legend.append(item);
      });
      if (state.mode === "combined") {
        const item = document.createElement("div");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = "#64748b";
        const label = document.createElement("span");
        label.textContent = "虚线为物理反向推动数学";
        item.append(swatch, label);
        legend.append(item);
      }
      return legend;
    }

    function createSvg(name, attrs = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => {
        element.setAttribute(key, value);
      });
      return element;
    }

    function getSvgPoint(event) {
      const rect = svg.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (VIEWBOX.width / rect.width),
        y: (event.clientY - rect.top) * (VIEWBOX.height / rect.height)
      };
    }

    function screenToGraph(event) {
      const point = getSvgPoint(event);
      return {
        x: (point.x - state.pan.x) / state.zoom,
        y: (point.y - state.pan.y) / state.zoom
      };
    }

    function startNodeDrag(event, id) {
      event.stopPropagation();
      const start = screenToGraph(event);
      const startScreen = { x: event.clientX, y: event.clientY };
      const positions = computePositions();
      const origin = positions[id];
      if (!origin) return;
      svg.setPointerCapture(event.pointerId);
      let moved = false;
      const move = (moveEvent) => {
        const current = screenToGraph(moveEvent);
        const distance = Math.hypot(moveEvent.clientX - startScreen.x, moveEvent.clientY - startScreen.y);
        if (!moved && distance <= 4) return;
        if (!moved) {
          moved = true;
          state.suppressClick = true;
          clearHoverState();
        }
        if (!state.customPositions[state.mode]) state.customPositions[state.mode] = {};
        state.customPositions[state.mode][id] = {
          x: clamp(origin.x + current.x - start.x, 90, 1310),
          y: clamp(origin.y + current.y - start.y, 70, 790)
        };
        render();
      };
      const stop = (upEvent) => {
        svg.releasePointerCapture(upEvent.pointerId);
        svg.removeEventListener("pointermove", move);
        svg.removeEventListener("pointerup", stop);
        svg.removeEventListener("pointercancel", stop);
        if (moved) window.setTimeout(() => {
          state.suppressClick = false;
        }, 80);
      };
      svg.addEventListener("pointermove", move);
      svg.addEventListener("pointerup", stop);
      svg.addEventListener("pointercancel", stop);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function zoomBy(factor) {
      state.zoom = clamp(state.zoom * factor, 0.62, 2.2);
      render();
    }

    let panSession = null;
    svg.addEventListener("pointerdown", (event) => {
      if (event.target.closest && event.target.closest(".node, .edge")) return;
      panSession = {
        x: event.clientX,
        y: event.clientY,
        pan: { ...state.pan }
      };
      svg.setPointerCapture(event.pointerId);
      clearInteractionState();
      render();
    });

    svg.addEventListener("pointermove", (event) => {
      if (!panSession) {
        syncHoverFromPointer(event);
        return;
      }
      const rect = svg.getBoundingClientRect();
      const dx = (event.clientX - panSession.x) * (VIEWBOX.width / rect.width);
      const dy = (event.clientY - panSession.y) * (VIEWBOX.height / rect.height);
      state.pan = {
        x: panSession.pan.x + dx,
        y: panSession.pan.y + dy
      };
      render();
    });

    svg.addEventListener("pointerup", (event) => {
      if (panSession) {
        panSession = null;
        svg.releasePointerCapture(event.pointerId);
      }
    });

    svg.addEventListener("pointerleave", () => {
      if (hasSelection() || (!state.hoveredNode && !state.hoveredEdge)) return;
      clearHoverState();
      render();
    });

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();
      const point = getSvgPoint(event);
      const graphPoint = {
        x: (point.x - state.pan.x) / state.zoom,
        y: (point.y - state.pan.y) / state.zoom
      };
      const factor = event.deltaY > 0 ? 0.92 : 1.08;
      state.zoom = clamp(state.zoom * factor, 0.62, 2.2);
      state.pan = {
        x: point.x - graphPoint.x * state.zoom,
        y: point.y - graphPoint.y * state.zoom
      };
      render();
    }, { passive: false });

    searchInput.addEventListener("input", () => {
      state.query = searchInput.value.trim().toLowerCase();
      render();
    });

    densityInput.addEventListener("input", () => {
      state.density = Number(densityInput.value);
      render();
    });

    focusToggle.addEventListener("change", () => {
      state.focus = focusToggle.checked;
      render();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (hasSelection() || state.hoveredNode || state.hoveredEdge) {
        clearInteractionState();
        render();
        return;
      }
      if (state.query) {
        state.query = "";
        searchInput.value = "";
        render();
      }
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => setMode(tab.dataset.mode));
    });

    document.getElementById("zoomOutButton").addEventListener("click", () => zoomBy(0.86));
    document.getElementById("zoomInButton").addEventListener("click", () => zoomBy(1.16));
    document.getElementById("resetButton").addEventListener("click", resetView);

    setMode("combined");

    function syncHoverFromPointer(event) {
      if (hasSelection()) {
        if (state.hoveredNode || state.hoveredEdge) {
          clearHoverState();
          render();
        }
        return;
      }
      const nodeElement = event.target.closest ? event.target.closest(".node") : null;
      const edgeElement = nodeElement ? null : event.target.closest ? event.target.closest(".edge") : null;
      const nextNode = nodeElement ? nodeElement.getAttribute("data-node-id") : null;
      const nextEdge = edgeElement ? edgeElement.getAttribute("data-edge-id") : null;
      if (nextNode === state.hoveredNode && nextEdge === state.hoveredEdge) return;
      state.hoveredNode = nextNode;
      state.hoveredEdge = nextEdge;
      render();
    }
  </script>
</body>
</html>
